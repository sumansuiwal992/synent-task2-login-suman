<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page UI</title>
    <link rel="stylesheet"href="style.css">
</head>
<script>
function logincheck(){
    let user = document.getElementById("name").value;
    let pass = document.getElementById("password").value;
    
    if(user !== "" && pass !== ""){
        window.location.href = "dashboard.html";
    } else {
        alert("Please fill all fields!");
    }
}
</script>
<body>
    <div class="card">
        
        <h2> Access Dashboard </h2>
        <h3>Username</h3>
          <input type="text"id="name" placeholder="Enter username" required>
          <h3>Email</h3>
            <input type="text"id="mail" placeholder="Email-Address" required>
            <h3>Password</h3>
            <input type="password"id="password" placeholder="Enter your Password" required>
            <br> <br>
             <input type="checkbox" id="remb">
             <label class="remb" for="remb">Remember me</label>
             <br>
            <p id="forgot"> forgot password ?<p>
            <br>
            <button class="login" onclick="logincheck()">login</button>

        
        </div>
</body>
</html>
