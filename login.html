<body>

        <form>

            <input type="password"id="password" placeholder="Enter your Password" required>
            <br> <br>
             <input type="checkbox" id="remb">

             <br>
            <p id="forgot"> forgot password ?<p>
            <br>
            <button class="login">login</button>
            


              



        </form>
        </div>
